name: Test local build

on:
  workflow_dispatch: # enable run button on github.com
  pull_request:

jobs:
  install-ddev:
    name: Build DDEV project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
      - name: Install DDEV
        run: curl -fsSL https://ddev.com/install.sh | bash
      - name: Display DDEV version
        run: ddev version
      - name: Init, code checks, test, and admin
        run: ddev test
